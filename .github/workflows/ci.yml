name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
          
      - name: TypeScript check
        run: npx tsc --noEmit
        
      - name: Build Next.js
        run: npm run build
        
      - name: Verify output
        run: |
          test -d .next && echo "✓ Build output verified"

  deploy:
    needs: smoke-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        run: echo "Deploy via Vercel integration or manual trigger"