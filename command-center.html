<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGP Command Center</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e27;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #00ff00;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .time {
            font-size: 12px;
            color: #888;
        }

        .card {
            border: 2px solid #00ff00;
            background: #0f1535;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #888;
        }

        .status-dot.active {
            background: #00ff00;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-line {
            font-size: 12px;
            color: #00ccff;
            margin-bottom: 10px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
            background: #00cc00;
        }

        .btn.full {
            width: 100%;
        }

        .btn.danger {
            background: #cc0000;
            color: #fff;
        }

        .log-card {
            border: 2px solid #00ff00;
            background: #0f1535;
            padding: 20px;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
        }

        .log-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 10px;
        }

        .log-entry {
            font-size: 11px;
            color: #00ccff;
            margin-bottom: 8px;
            padding: 5px;
            border-left: 2px solid #00ff00;
            padding-left: 10px;
        }

        .log-entry.success {
            color: #00ff00;
        }

        .log-entry.error {
            color: #ff0000;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .header h1 {
                font-size: 20px;
            }

            .card {
                padding: 15px;
            }

            .btn {
                padding: 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎮 AGP COMMAND CENTER</h1>
            <div class="time" id="time"></div>
        </div>

        <!-- AGP Card -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">🎙️ AGP PODCAST</div>
                <div class="status-dot" id="agp-dot"></div>
            </div>
            <div class="status-line">Status: <span id="agp-status">IDLE</span></div>
            <div class="buttons">
                <button class="btn" onclick="control('agp', 'START')">▶ START</button>
                <button class="btn danger" onclick="control('agp', 'STOP')">⏹ STOP</button>
            </div>
        </div>

        <!-- ARENA Card -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">🧠 THE ARENA</div>
                <div class="status-dot" id="arena-dot"></div>
            </div>
            <div class="status-line">Status: <span id="arena-status">READY</span></div>
            <button class="btn full" onclick="control('arena', 'ANALYZE')">🔄 ANALYZE</button>
        </div>

        <!-- NINJA Card -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">⚡ NINJA AGENTS</div>
                <div class="status-dot" id="ninja-dot"></div>
            </div>
            <div class="status-line">Status: <span id="ninja-status">IDLE</span></div>
            <button class="btn full" onclick="control('ninja', 'EXECUTE')">⚙️ EXECUTE</button>
        </div>

        <!-- DEFI Card -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">💰 DEFI EXECUTION</div>
                <div class="status-dot" id="defi-dot"></div>
            </div>
            <div class="status-line">Status: <span id="defi-status">IDLE</span></div>
            <button class="btn full" onclick="control('defi', 'TRADE')">💸 TRADE</button>
        </div>

        <!-- Log -->
        <div class="log-card">
            <div class="log-title">📋 EXECUTION LOG</div>
            <div id="log"></div>
        </div>
    </div>

    <script>
        const systems = {
            agp: { status: 'IDLE', dot: 'agp-dot' },
            arena: { status: 'READY', dot: 'arena-dot' },
            ninja: { status: 'IDLE', dot: 'ninja-dot' },
            defi: { status: 'IDLE', dot: 'defi-dot' },
        };

        const log = [];

        function updateTime() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString();
        }

        function addLog(msg, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const entry = `[${time}] ${msg}`;
            log.unshift(entry);
            if (log.length > 50) log.pop();

            const logDiv = document.getElementById('log');
            const el = document.createElement('div');
            el.className = `log-entry ${type}`;
            el.textContent = entry;
            logDiv.insertBefore(el, logDiv.firstChild);

            // Keep only last 50 visible
            while (logDiv.children.length > 50) {
                logDiv.removeChild(logDiv.lastChild);
            }
        }

        function control(system, action) {
            const statusEl = document.getElementById(`${system}-status`);
            const dotEl = document.getElementById(`${system}-dot`);

            // Set to ACTIVE
            statusEl.textContent = 'ACTIVE';
            dotEl.classList.add('active');
            addLog(`${system.toUpperCase()} → ${action}`, 'info');

            // Simulate execution
            setTimeout(() => {
                statusEl.textContent = 'IDLE';
                dotEl.classList.remove('active');
                addLog(`${system.toUpperCase()} → Complete`, 'success');
            }, 2000);
        }

        // Update time every second
        updateTime();
        setInterval(updateTime, 1000);

        // Initialize
        addLog('System initialized', 'success');
        addLog('Ready for commands', 'success');
    </script>
</body>
</html>
