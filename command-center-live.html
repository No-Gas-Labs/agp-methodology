<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGP Command Center</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e27;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #00ff00;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .time {
            font-size: 12px;
            color: #888;
        }

        .api-status {
            font-size: 11px;
            color: #00ccff;
            margin-top: 5px;
        }

        .card {
            border: 2px solid #00ff00;
            background: #0f1535;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #888;
        }

        .status-dot.active {
            background: #00ff00;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-line {
            font-size: 12px;
            color: #00ccff;
            margin-bottom: 10px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
            background: #00cc00;
        }

        .btn:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .btn.full {
            width: 100%;
        }

        .btn.danger {
            background: #cc0000;
            color: #fff;
        }

        .log-card {
            border: 2px solid #00ff00;
            background: #0f1535;
            padding: 20px;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
        }

        .log-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 10px;
        }

        .log-entry {
            font-size: 11px;
            color: #00ccff;
            margin-bottom: 8px;
            padding: 5px;
            border-left: 2px solid #00ff00;
            padding-left: 10px;
        }

        .log-entry.success {
            color: #00ff00;
        }

        .log-entry.error {
            color: #ff0000;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .header h1 {
                font-size: 20px;
            }

            .card {
                padding: 15px;
            }

            .btn {
                padding: 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎮 AGP COMMAND CENTER</h1>
            <div class="time" id="time"></div>
            <div class="api-status" id="api-status">Connecting to backend...</div>
        </div>

        <!-- AGP Card -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">🎙️ AGP PODCAST</div>
                <div class="status-dot" id="agp-dot"></div>
            </div>
            <div class="status-line">Status: <span id="agp-status">IDLE</span></div>
            <div class="buttons">
                <button class="btn" id="agp-start" onclick="control('agp', 'start')">▶ START</button>
                <button class="btn danger" id="agp-stop" onclick="control('agp', 'stop')">⏹ STOP</button>
            </div>
        </div>

        <!-- ARENA Card -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">🧠 THE ARENA</div>
                <div class="status-dot" id="arena-dot"></div>
            </div>
            <div class="status-line">Status: <span id="arena-status">READY</span></div>
            <div class="status-line">Consensus: <span id="arena-consensus">0%</span></div>
            <button class="btn full" id="arena-btn" onclick="control('arena', 'analyze')">🔄 ANALYZE</button>
        </div>

        <!-- NINJA Card -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">⚡ NINJA AGENTS</div>
                <div class="status-dot" id="ninja-dot"></div>
            </div>
            <div class="status-line">Status: <span id="ninja-status">IDLE</span></div>
            <div class="status-line">Agents: <span id="ninja-agents">0</span> | Decisions: <span id="ninja-decisions">0</span></div>
            <button class="btn full" id="ninja-btn" onclick="control('ninja', 'execute')">⚙️ EXECUTE</button>
        </div>

        <!-- DEFI Card -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">💰 DEFI EXECUTION</div>
                <div class="status-dot" id="defi-dot"></div>
            </div>
            <div class="status-line">Status: <span id="defi-status">IDLE</span></div>
            <div class="status-line">Profit: $<span id="defi-profit">0</span> | Fees: $<span id="defi-fees">0</span></div>
            <button class="btn full" id="defi-btn" onclick="control('defi', 'trade')">💸 TRADE</button>
        </div>

        <!-- Log -->
        <div class="log-card">
            <div class="log-title">📋 EXECUTION LOG</div>
            <div id="log"></div>
        </div>
    </div>

    <script>
        // Configuration
        const API_URL = 'https://agp-backend.onrender.com'; // Will be updated after deployment
        let connected = false;
        const log = [];

        function updateTime() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString();
        }

        function addLog(msg, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const entry = `[${time}] ${msg}`;
            log.unshift(entry);
            if (log.length > 50) log.pop();

            const logDiv = document.getElementById('log');
            const el = document.createElement('div');
            el.className = `log-entry ${type}`;
            el.textContent = entry;
            logDiv.insertBefore(el, logDiv.firstChild);

            while (logDiv.children.length > 50) {
                logDiv.removeChild(logDiv.lastChild);
            }
        }

        async function checkConnection() {
            try {
                const res = await fetch(`${API_URL}/health`);
                if (res.ok) {
                    connected = true;
                    document.getElementById('api-status').textContent = '✅ Connected to backend';
                    document.getElementById('api-status').style.color = '#00ff00';
                    addLog('Backend connected', 'success');
                    updateStatus();
                } else {
                    throw new Error('Health check failed');
                }
            } catch (e) {
                connected = false;
                document.getElementById('api-status').textContent = '❌ Backend offline';
                document.getElementById('api-status').style.color = '#ff0000';
                setTimeout(checkConnection, 5000);
            }
        }

        async function updateStatus() {
            if (!connected) return;
            try {
                const res = await fetch(`${API_URL}/api/status`);
                const state = await res.json();

                // Update AGP
                document.getElementById('agp-status').textContent = state.agp.status;
                document.getElementById('agp-dot').className = state.agp.status !== 'IDLE' ? 'status-dot active' : 'status-dot';

                // Update ARENA
                document.getElementById('arena-status').textContent = state.arena.status;
                document.getElementById('arena-consensus').textContent = (state.arena.consensus * 100).toFixed(0) + '%';
                document.getElementById('arena-dot').className = state.arena.status !== 'READY' ? 'status-dot active' : 'status-dot';

                // Update NINJA
                document.getElementById('ninja-status').textContent = state.ninja.status;
                document.getElementById('ninja-agents').textContent = state.ninja.agents;
                document.getElementById('ninja-decisions').textContent = state.ninja.decisions;
                document.getElementById('ninja-dot').className = state.ninja.status !== 'IDLE' ? 'status-dot active' : 'status-dot';

                // Update DEFI
                document.getElementById('defi-status').textContent = state.defi.status;
                document.getElementById('defi-profit').textContent = state.defi.profit;
                document.getElementById('defi-fees').textContent = state.defi.fees;
                document.getElementById('defi-dot').className = state.defi.status !== 'IDLE' ? 'status-dot active' : 'status-dot';

                // Fetch logs
                const logsRes = await fetch(`${API_URL}/api/logs`);
                const logs = await logsRes.json();
                const logDiv = document.getElementById('log');
                logDiv.innerHTML = '';
                logs.forEach(l => {
                    const el = document.createElement('div');
                    el.className = `log-entry ${l.status}`;
                    el.textContent = `[${new Date(l.time).toLocaleTimeString()}] ${l.msg}`;
                    logDiv.appendChild(el);
                });
            } catch (e) {
                console.error('Status update failed:', e);
            }
        }

        async function control(system, action) {
            if (!connected) {
                alert('Backend not connected');
                return;
            }

            const btn = document.getElementById(`${system}-btn`) || document.querySelector(`button[onclick*="${system}"][onclick*="${action}"]`);
            if (btn) btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}/api/control/${system}/${action}`, { method: 'POST' });
                if (res.ok) {
                    addLog(`${system.toUpperCase()} → ${action.toUpperCase()}`, 'success');
                    updateStatus();
                } else {
                    addLog(`${system.toUpperCase()} → ${action.toUpperCase()} FAILED`, 'error');
                }
            } catch (e) {
                addLog(`${system.toUpperCase()} → ERROR`, 'error');
            } finally {
                if (btn) btn.disabled = false;
            }
        }

        // Initialize
        updateTime();
        setInterval(updateTime, 1000);
        setInterval(updateStatus, 2000);
        checkConnection();
        addLog('System initialized', 'success');
    </script>
</body>
</html>
