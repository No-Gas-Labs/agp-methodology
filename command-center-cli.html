<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGP Command Center + CLI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e27;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            padding: 10px;
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media (max-width: 1200px) {
            body {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            border: 2px solid #00ff00;
            background: #0f1535;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            background: #1a2555;
            padding: 10px;
            border-bottom: 2px solid #00ff00;
            font-weight: bold;
            font-size: 14px;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-size: 12px;
        }

        .card {
            border: 1px solid #00ff00;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 3px;
        }

        .card-title {
            font-weight: bold;
            margin-bottom: 5px;
            color: #00ccff;
        }

        .status-line {
            font-size: 11px;
            color: #00ccff;
            margin: 3px 0;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #888;
            margin-right: 5px;
        }

        .status-dot.active {
            background: #00ff00;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .buttons {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }

        .btn {
            flex: 1;
            padding: 8px;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 3px;
            font-weight: bold;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
            background: #00cc00;
        }

        .btn:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .btn.danger {
            background: #cc0000;
            color: #fff;
        }

        .btn.full {
            width: 100%;
        }

        /* CLI Styles */
        .cli-input-area {
            display: flex;
            gap: 5px;
            padding: 10px;
            border-top: 1px solid #00ff00;
            background: #0a0e27;
        }

        .cli-input {
            flex: 1;
            background: #1a2555;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            border-radius: 3px;
        }

        .cli-input:focus {
            outline: none;
            border-color: #00ccff;
        }

        .cli-output {
            max-height: 300px;
            overflow-y: auto;
            background: #0a0e27;
            padding: 10px;
            border-radius: 3px;
            margin-bottom: 10px;
        }

        .cli-line {
            margin: 2px 0;
            font-size: 11px;
        }

        .cli-line.input {
            color: #00ccff;
        }

        .cli-line.output {
            color: #00ff00;
        }

        .cli-line.error {
            color: #ff0000;
        }

        .log-entry {
            font-size: 10px;
            color: #00ccff;
            margin: 3px 0;
            padding: 3px;
            border-left: 2px solid #00ff00;
            padding-left: 8px;
        }

        .log-entry.success {
            color: #00ff00;
        }

        .log-entry.error {
            color: #ff0000;
        }

        .header {
            grid-column: 1 / -1;
            border: 2px solid #00ff00;
            background: #0f1535;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }

        .header h1 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .api-status {
            font-size: 11px;
            color: #00ccff;
        }

        .scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .scrollbar::-webkit-scrollbar-track {
            background: #0a0e27;
        }

        .scrollbar::-webkit-scrollbar-thumb {
            background: #00ff00;
            border-radius: 4px;
        }

        .scrollbar::-webkit-scrollbar-thumb:hover {
            background: #00ccff;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1>🎮 AGP COMMAND CENTER + CLI</h1>
        <div class="api-status" id="api-status">Connecting...</div>
    </div>

    <!-- Left Panel: Dashboard -->
    <div class="panel">
        <div class="panel-header">📊 DASHBOARD</div>
        <div class="panel-content scrollbar">
            <!-- AGP Card -->
            <div class="card">
                <div class="card-title"><span class="status-dot" id="agp-dot"></span>🎙️ AGP PODCAST</div>
                <div class="status-line">Status: <span id="agp-status">IDLE</span></div>
                <div class="buttons">
                    <button class="btn" onclick="control('agp', 'start')">▶ START</button>
                    <button class="btn danger" onclick="control('agp', 'stop')">⏹ STOP</button>
                </div>
            </div>

            <!-- ARENA Card -->
            <div class="card">
                <div class="card-title"><span class="status-dot" id="arena-dot"></span>🧠 THE ARENA</div>
                <div class="status-line">Status: <span id="arena-status">READY</span></div>
                <div class="status-line">Consensus: <span id="arena-consensus">0%</span></div>
                <button class="btn full" onclick="control('arena', 'analyze')">🔄 ANALYZE</button>
            </div>

            <!-- NINJA Card -->
            <div class="card">
                <div class="card-title"><span class="status-dot" id="ninja-dot"></span>⚡ NINJA AGENTS</div>
                <div class="status-line">Status: <span id="ninja-status">IDLE</span></div>
                <div class="status-line">Agents: <span id="ninja-agents">0</span></div>
                <button class="btn full" onclick="control('ninja', 'execute')">⚙️ EXECUTE</button>
            </div>

            <!-- DEFI Card -->
            <div class="card">
                <div class="card-title"><span class="status-dot" id="defi-dot"></span>💰 DEFI</div>
                <div class="status-line">Status: <span id="defi-status">IDLE</span></div>
                <div class="status-line">Profit: $<span id="defi-profit">0</span></div>
                <button class="btn full" onclick="control('defi', 'trade')">💸 TRADE</button>
            </div>
        </div>
    </div>

    <!-- Right Panel: CLI -->
    <div class="panel">
        <div class="panel-header">⌨️ CLI TERMINAL</div>
        <div class="panel-content scrollbar">
            <div class="cli-output" id="cli-output"></div>
            <div id="log-area"></div>
        </div>
        <div class="cli-input-area">
            <input type="text" id="cli-input" class="cli-input" placeholder="Enter command..." autocomplete="off">
        </div>
    </div>

    <script>
        const API_URL = 'https://agp-backend-x82t.onrender.com';
        let connected = false;
        const cliHistory = [];
        let historyIndex = -1;

        // CLI Functions
        function addCliLine(text, type = 'output') {
            const output = document.getElementById('cli-output');
            const line = document.createElement('div');
            line.className = `cli-line ${type}`;
            line.textContent = text;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        function parseCommand(cmd) {
            const parts = cmd.trim().split(' ');
            const command = parts[0];
            const args = parts.slice(1);

            switch (command) {
                case 'help':
                    addCliLine('Available commands:', 'output');
                    addCliLine('  status - Show system status', 'output');
                    addCliLine('  control <system> <action> - Control a system', 'output');
                    addCliLine('  set <key> <value> - Set a configuration', 'output');
                    addCliLine('  get <key> - Get a configuration', 'output');
                    addCliLine('  logs - Show execution logs', 'output');
                    addCliLine('  clear - Clear CLI output', 'output');
                    addCliLine('  help - Show this help', 'output');
                    break;

                case 'status':
                    updateStatus();
                    addCliLine('Status updated', 'output');
                    break;

                case 'control':
                    if (args.length < 2) {
                        addCliLine('Usage: control <system> <action>', 'error');
                    } else {
                        control(args[0], args[1]);
                    }
                    break;

                case 'set':
                    if (args.length < 2) {
                        addCliLine('Usage: set <key> <value>', 'error');
                    } else {
                        localStorage.setItem(args[0], args.slice(1).join(' '));
                        addCliLine(`Set ${args[0]} = ${args.slice(1).join(' ')}`, 'output');
                    }
                    break;

                case 'get':
                    if (args.length < 1) {
                        addCliLine('Usage: get <key>', 'error');
                    } else {
                        const val = localStorage.getItem(args[0]);
                        addCliLine(`${args[0]} = ${val || 'undefined'}`, 'output');
                    }
                    break;

                case 'logs':
                    fetch(`${API_URL}/api/logs`)
                        .then(r => r.json())
                        .then(logs => {
                            logs.forEach(l => {
                                addCliLine(`[${new Date(l.time).toLocaleTimeString()}] ${l.msg}`, 'output');
                            });
                        })
                        .catch(e => addCliLine(`Error: ${e.message}`, 'error'));
                    break;

                case 'clear':
                    document.getElementById('cli-output').innerHTML = '';
                    break;

                case '':
                    break;

                default:
                    addCliLine(`Unknown command: ${command}. Type 'help' for available commands.`, 'error');
            }
        }

        // CLI Input Handler
        document.getElementById('cli-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = e.target.value;
                addCliLine(`$ ${cmd}`, 'input');
                cliHistory.push(cmd);
                historyIndex = -1;
                parseCommand(cmd);
                e.target.value = '';
            } else if (e.key === 'ArrowUp') {
                historyIndex = Math.min(historyIndex + 1, cliHistory.length - 1);
                e.target.value = cliHistory[cliHistory.length - 1 - historyIndex] || '';
            } else if (e.key === 'ArrowDown') {
                historyIndex = Math.max(historyIndex - 1, -1);
                e.target.value = historyIndex >= 0 ? cliHistory[cliHistory.length - 1 - historyIndex] : '';
            }
        });

        // System Control
        async function control(system, action) {
            if (!connected) {
                addCliLine('Backend not connected', 'error');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/api/control/${system}/${action}`, { method: 'POST' });
                if (res.ok) {
                    addCliLine(`${system.toUpperCase()} → ${action.toUpperCase()} ✓`, 'output');
                    updateStatus();
                } else {
                    addCliLine(`${system.toUpperCase()} → ${action.toUpperCase()} ✗`, 'error');
                }
            } catch (e) {
                addCliLine(`Error: ${e.message}`, 'error');
            }
        }

        // Status Update
        async function updateStatus() {
            if (!connected) return;
            try {
                const res = await fetch(`${API_URL}/api/status`);
                const state = await res.json();

                document.getElementById('agp-status').textContent = state.agp.status;
                document.getElementById('agp-dot').className = state.agp.status !== 'IDLE' ? 'status-dot active' : 'status-dot';

                document.getElementById('arena-status').textContent = state.arena.status;
                document.getElementById('arena-consensus').textContent = (state.arena.consensus * 100).toFixed(0) + '%';
                document.getElementById('arena-dot').className = state.arena.status !== 'READY' ? 'status-dot active' : 'status-dot';

                document.getElementById('ninja-status').textContent = state.ninja.status;
                document.getElementById('ninja-agents').textContent = state.ninja.agents;
                document.getElementById('ninja-dot').className = state.ninja.status !== 'IDLE' ? 'status-dot active' : 'status-dot';

                document.getElementById('defi-status').textContent = state.defi.status;
                document.getElementById('defi-profit').textContent = state.defi.profit;
                document.getElementById('defi-dot').className = state.defi.status !== 'IDLE' ? 'status-dot active' : 'status-dot';
            } catch (e) {
                console.error('Status update failed:', e);
            }
        }

        // Connection Check
        async function checkConnection() {
            try {
                const res = await fetch(`${API_URL}/health`);
                if (res.ok) {
                    connected = true;
                    document.getElementById('api-status').textContent = '✅ Connected';
                    document.getElementById('api-status').style.color = '#00ff00';
                    addCliLine('Backend connected', 'output');
                    updateStatus();
                } else {
                    throw new Error('Health check failed');
                }
            } catch (e) {
                connected = false;
                document.getElementById('api-status').textContent = '❌ Offline';
                document.getElementById('api-status').style.color = '#ff0000';
                setTimeout(checkConnection, 5000);
            }
        }

        // Initialize
        addCliLine('AGP Command Center + CLI', 'output');
        addCliLine('Type "help" for available commands', 'output');
        checkConnection();
        setInterval(updateStatus, 2000);
        document.getElementById('cli-input').focus();
    </script>
</body>
</html>
